name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: node v14.15.4
        uses: actions/setup-node@v1
        with:
          node-version: '14.15.4'
      - name: Install packages
        run: pnpm install
      - name: Lint
        run: pnpm lint
      - name: Build
        run: pnpm build
      - name: Test (development)
        run: pnpm test:dev
      - name: Test (minified)
        run: pnpm test:minified
      - name: Test (development, JSX runtime)
        run: pnpm test:jsx:dev
      - name: Test (minified, JSX runtime)
        run: pnpm test:jsx:minified
